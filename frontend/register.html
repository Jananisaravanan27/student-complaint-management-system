<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Complaint Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F0F4F9;
      font-family: 'Inter', sans-serif;
      color: #1A2C3E;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .auth-card {
      max-width: 500px;
      width: 90%;
      background: white;
      border-radius: 28px;
      padding: 2rem;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
    }
    .logo { text-align: center; margin-bottom: 1.5rem; }
    .logo h2 { color: #185FA5; font-weight: 700; }
    .role-toggle {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.8rem;
      background: #F1F5F9;
      padding: 0.3rem;
      border-radius: 40px;
    }
    .role-opt {
      flex: 1;
      text-align: center;
      padding: 0.6rem;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
    }
    .role-opt.active {
      background: #185FA5;
      color: white;
    }
    .input-group { margin-bottom: 1.2rem; }
    .input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .input-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #DCE3EC;
      border-radius: 14px;
      font-size: 0.9rem;
    }
    button {
      background: #185FA5;
      color: white;
      border: none;
      padding: 0.8rem;
      width: 100%;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .switch-link {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.8rem;
    }
    .switch-link a {
      color: #185FA5;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
    }
    .alert {
      padding: 0.7rem;
      border-radius: 14px;
      margin-bottom: 1rem;
      font-size: 0.8rem;
    }
    .alert-error { background: #FEE2E2; color: #B91C1C; }
    .alert-success { background: #E0F2E9; color: #0A5C3E; }
  </style>
</head>
<body>
<div class="auth-card">
  <div class="logo"><h2>📋 Create Account</h2><p>Join ComplaintPortal</p></div>
  <div class="role-toggle" id="roleToggle">
    <div class="role-opt active" data-role="student">Student</div>
    <div class="role-opt" data-role="admin">Admin</div>
  </div>
  <div id="alertContainer"></div>
  <div class="input-group"><label>Full name</label><input type="text" id="name" placeholder="John Doe"></div>
  <div class="input-group"><label>Email</label><input type="email" id="email" placeholder="you@example.com"></div>
  <div class="input-group"><label>Password</label><input type="password" id="password" placeholder="Min. 6 characters"></div>
  <button id="registerBtn">Register</button>
  <div class="switch-link">Already have an account? <a href="login.html">Sign in</a></div>
</div>

<script>
  const API_URL = 'http://localhost:5001/api';
  let selectedRole = 'student';

  document.querySelectorAll('.role-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.role-opt').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      selectedRole = opt.getAttribute('data-role');
    });
  });

  function showAlert(msg, isError = true) {
    const container = document.getElementById('alertContainer');
    container.innerHTML = `<div class="alert ${isError ? 'alert-error' : 'alert-success'}">${msg}</div>`;
    setTimeout(() => { if (container.firstChild) container.innerHTML = ''; }, 4000);
  }

  document.getElementById('registerBtn').onclick = async () => {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!name || !email || !password) return showAlert('All fields required');
    if (password.length < 6) return showAlert('Password must be at least 6 characters');
    try {
      const res = await fetch(`${API_URL}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, role: selectedRole })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.msg || 'Registration failed');
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showAlert('Registration successful! Redirecting to dashboard...', false);
      setTimeout(() => {
        if (data.user.role === 'student') window.location.href = 'student-dashboard.html';
        else window.location.href = 'admin-dashboard.html';
      }, 1500);
    } catch (err) {
      showAlert(err.message);
    }
  };
</script>
</body>
</html>
