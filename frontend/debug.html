<!DOCTYPE html>
<html>
<head>
    <title>API Debug</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .response { background: #f0f0f0; padding: 10px; border-radius: 4px; margin-top: 10px; white-space: pre-wrap; }
        textarea { width: 100%; height: 100px; }
        button { padding: 10px; margin: 10px 5px 10px 0; }
    </style>
</head>
<body>
<div class="container">
    <h2>API Debug Console</h2>
    
    <h3>Test Registration (Admin)</h3>
    <input type="email" id="regEmail" placeholder="Email" value="admin@test.com">
    <input type="text" id="regName" placeholder="Name" value="Test Admin">
    <input type="password" id="regPwd" placeholder="Password" value="password123">
    <button onclick="testRegister()">Register as Admin</button>
    
    <h3>Test Login</h3>
    <input type="email" id="loginEmail" placeholder="Email" value="admin@test.com">
    <input type="password" id="loginPwd" placeholder="Password" value="password123">
    <button onclick="testLogin()">Login</button>
    
    <h3>Response:</h3>
    <div id="response" class="response">Waiting...</div>
</div>

<script>
const API_URL = 'http://localhost:5001/api';

async function testRegister() {
    const data = {
        name: document.getElementById('regName').value,
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPwd').value,
        role: 'admin'
    };
    try {
        const res = await fetch(`${API_URL}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const responseData = await res.json();
        document.getElementById('response').textContent = 
            'Status: ' + res.status + '\n\n' + 
            JSON.stringify(responseData, null, 2) + '\n\n' +
            'User Role: ' + (responseData.user?.role || 'NOT FOUND');
        console.log('Registration Response:', responseData);
    } catch (err) {
        document.getElementById('response').textContent = 'Error: ' + err.message;
    }
}

async function testLogin() {
    const data = {
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPwd').value
    };
    try {
        const res = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const responseData = await res.json();
        document.getElementById('response').textContent = 
            'Status: ' + res.status + '\n\n' + 
            JSON.stringify(responseData, null, 2) + '\n\n' +
            'User Role: ' + (responseData.user?.role || 'NOT FOUND') + '\n' +
            'Expected: admin\nMatch: ' + (responseData.user?.role === 'admin' ? '✓ YES' : '✗ NO');
        console.log('Login Response:', responseData);
    } catch (err) {
        document.getElementById('response').textContent = 'Error: ' + err.message;
    }
}
</script>
</body>
</html>
